<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Warga - DesaDigital</title>
    <link rel="stylesheet" href="css login desa.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=" rel="stylesheet">
</head>
<body>

    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <span class="text-green">Desa</span><span class="text-blue">Digital</span>
            </div>
            
            <h2>Login Warga</h2>
            <p class="subtitle">Silakan masukkan NIK dan password Anda.</p>

            <form action="#" method="POST">
                <div class="input-group">
                    <label for="nik">NIK / Gmail </label>
                    <input type="text" id="nik" name="nik" placeholder="Masukkan NIK Anda" required>
                </div>
                
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Masukkan password" required>
                </div>

                <div>
                <button type="submit" class="btn-login">Masuk</button>
                <a href="dashboard kades.html" class="login-btn"></a>
                </div>

            </form>

            <div class="back-link">
                <a href="Dana desa.html">← Kembali ke Beranda</a>
            </div>
        </div>
    </div>

</body>
</html>
