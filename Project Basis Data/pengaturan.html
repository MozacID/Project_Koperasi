<!DOCTYPE html>
<html lang="id" data-theme="light" data-style="normal">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengaturan</title>
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>
    <div class="liquid-bg">
        <div class="blob blob-1"></div><div class="blob blob-2"></div><div class="blob blob-3"></div>
    </div>

    <div class="dashboard-container">
        <aside class="sidebar panel-glass">
            <div class="sidebar-header"><h2>Koperasi</h2></div>
            <div class="profile-section">
                <div class="profile-image-container">
                    <img id="profilePreview" src="https://ui-avatars.com/api/?name=Admin&background=3b82f6&color=fff" alt="Profil">
                    <label for="uploadPhoto" class="upload-overlay"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg></label>
                    <input type="file" id="uploadPhoto" accept="image/*" hidden>
                </div>
                <h3>Halo, Admin!</h3>
            </div>
            <ul class="nav-links">
                <li><a href="admin-dashboard.html">Dashboard</a></li>
                <li><a href="data-anggota.html">Data Anggota</a></li>
                <li><a href="data-pinjaman.html">Data Pinjaman</a></li>
                <li><a href="pengaturan.html" class="active">Pengaturan</a></li>
            </ul>
            <div class="logout-section"><a href="index.html" class="logout-btn">Keluar</a></div>
        </aside>

        <main class="main-content">
            <header class="top-header panel-glass">
                <div class="header-title"><h3>Pengaturan Sistem</h3></div>
                <div class="theme-controls">
                    <button id="toggleTheme" class="icon-btn"></button>
                    <button id="toggleStyle" class="icon-btn"></button>
                </div>
            </header>

            <div class="panel-glass" style="padding: 25px; border-radius: 15px;">
                <h4 class="page-title">Profil Koperasi</h4>
                <form class="settings-form" onsubmit="event.preventDefault(); alert('Pengaturan Disimpan!');">
                    <div class="form-group">
                        <label for="koperasiName">Nama Koperasi</label>
                        <input type="text" id="koperasiName" value="Koperasi Simpan Pinjam Sejahtera">
                    </div>
                    <div class="form-group">
                        <label for="koperasiEmail">Email Admin</label>
                        <input type="email" id="koperasiEmail" value="admin@koperasi.com">
                    </div>
                    <div class="form-group">
                        <label for="koperasiPassword">Ganti Password Admin</label>
                        <input type="password" id="koperasiPassword" placeholder="Masukkan password baru...">
                    </div>
                    <button type="submit" class="btn-primary">Simpan Perubahan</button>
                </form>
            </div>
        </main>
    </div>
    <script src="dashboard.js"></script>
</body>
</html>
