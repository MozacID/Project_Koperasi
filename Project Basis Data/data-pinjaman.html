<!DOCTYPE html>
<html lang="id" data-theme="light" data-style="normal">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Pinjaman - Koperasi</title>
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>
    <div class="liquid-bg">
        <div class="blob blob-1"></div><div class="blob blob-2"></div><div class="blob blob-3"></div>
    </div>

    <div class="dashboard-container">
        <aside class="sidebar panel-glass">
            <div class="sidebar-header"><h2>Koperasi</h2></div>
            <div class="profile-section">
                <div class="profile-image-container">
                    <img id="profilePreview" src="https://ui-avatars.com/api/?name=Admin&background=3b82f6&color=fff" alt="Profil">
                </div>
                <h3>Halo, Admin!</h3>
            </div>
            <ul class="nav-links">
                <li><a href="admin-dashboard.html">Dashboard</a></li>
                <li><a href="data-anggota.html">Data Anggota</a></li>
                <li><a href="data-pinjaman.html" class="active">Data Pinjaman</a></li>
                <li><a href="pengaturan.html">Pengaturan</a></li>
            </ul>
            <div class="logout-section"><a href="index.html" class="logout-btn">Keluar</a></div>
        </aside>

        <main class="main-content">
            <header class="top-header panel-glass">
                <div class="header-title"><h3>Laporan Pinjaman</h3></div>
                <div class="theme-controls">
                    <button id="toggleTheme" class="icon-btn"></button>
                    <button id="toggleStyle" class="icon-btn"></button>
                </div>
            </header>

            <div class="panel-glass" style="padding: 25px; border-radius: 15px;">
                <div class="header-action">
                    <h4 class="page-title">Data Peminjaman</h4> <button class="btn-primary">+ Buat Pinjaman</button>
                </div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>No</th>
                                <th>Peminjam</th>
                                <th>Alamat</th>
                                <th>Total</th>
                                <th>Status</th>
                                <th>Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="tablePinjamanBody">                           
                        </tbody>
                    </table>
                    </div> <div class="pagination-container" id="paginationPinjaman">
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="detailModal" class="modal-overlay" style="display:none;">
        <div class="modal-content panel-glass">
            <h3 id="modalNama">Nama Peminjam</h3>
            <p><small id="modalID">ID Pinjaman</small></p>
            <hr style="margin: 15px 0; opacity: 0.2;">
            <div class="detail-grid">
                <div><label>Total Pinjaman</label><p id="modalTotal"></p></div>
                <div><label>Sudah Dibayar</label><p id="modalTerbayar"></p></div>
                <div><label>Sisa Tagihan</label><p id="modalSisa" style="color:var(--danger-color); font-weight:bold;"></p></div>
                <div><label>Terakhir Bayar</label><p id="modalTgl"></p></div>
                <div><label>Denda Terakumulasi</label><p id="modalDenda"></p></div>
            </div>
            <p id="modalDendaNote" style="font-size: 12px; margin-top: 10px;"></p>
            <button class="btn-primary" onclick="closeModal()" style="margin-top: 20px; width:100%;">Tutup</button>
        </div>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
