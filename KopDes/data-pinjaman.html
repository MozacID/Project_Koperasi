<!DOCTYPE html>
<html lang="id" data-theme="light" data-style="normal">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Pinjaman</title>
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>
    <div class="liquid-bg">
        <div class="blob blob-1"></div><div class="blob blob-2"></div><div class="blob blob-3"></div>
    </div>

    <div class="dashboard-container">
        <aside class="sidebar panel-glass">
            <div class="sidebar-header"><h2>Koperasi</h2></div>
            <div class="profile-section">
                <div class="profile-image-container">
                    <img id="profilePreview" src="https://ui-avatars.com/api/?name=Admin&background=10b981&color=fff" alt="Profil">
                </div>
                <h3>Halo, Admin!</h3>
            </div>
            <ul class="nav-links">
                <li><a href="admin-dashboard.html">Dashboard</a></li>
                <li><a href="data-anggota.html">Data Anggota</a></li>
                <li><a href="data-pinjaman.html" class="active">Data Pinjaman</a></li>
                <li><a href="laporan.html">Laporan Keuangan</a></li>
            </ul>
            <div class="logout-section"><a href="index.html" class="logout-btn">Keluar</a></div>
        </aside>

        <main class="main-content">
            <header class="top-header panel-glass">
                <div class="header-title"><h3>Laporan Pinjaman</h3></div>
                <div class="header-actions-right">
                    <div class="theme-controls">
                        <button id="toggleTheme" class="icon-btn"></button>
                        <button id="toggleStyle" class="icon-btn"></button>
                    </div>
                </div>
            </header>

            <div class="panel-glass" style="padding: 25px; border-radius: 15px;">
                <div class="header-action">
                    <h4 class="page-title">Data Peminjaman</h4>
                    <button class="btn-primary" onclick="openAddLoanModal()">+ Buat Pinjaman</button>
                </div>
                
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>No</th>
                                <th>Peminjam</th>
                                <th>Alamat</th>
                                <th>Total</th>
                                <th>Status</th>
                                <th>Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="tablePinjamanBody">
                            </tbody>
                    </table>
                </div>
                
                <div class="pagination-container" id="paginationPinjaman"></div>
                
            </div>
        </main>
    </div>
    <div id="addLoanModal" class="modal-overlay" style="display:none;">
        <div class="modal-content panel-glass" style="max-width: 450px; width: 90%; padding: 25px; text-align: left;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h3 style="margin: 0; font-size: 18px; color: var(--primary-color, #10b981);">Buat Pinjaman Baru</h3>
                <button onclick="closeAddLoanModal()" style="background:none; border:none; font-size:22px; cursor:pointer; color:inherit; opacity: 0.7;">✕</button>
            </div>
            <hr style="margin-bottom: 20px; border: none; border-top: 1px solid rgba(128,128,128,0.2);">
            
            <form id="addLoanForm" onsubmit="submitAddLoan(event)" style="display: flex; flex-direction: column; gap: 15px;">
                <div>
                    <label style="font-size: 13px; font-weight: 600; opacity: 0.9;">Nama Peminjam</label>
                    <input type="text" id="inputPeminjam" class="glass-input" required placeholder="Contoh: Panjul Setiawan">
                </div>
                <div>
                    <label style="font-size: 13px; font-weight: 600; opacity: 0.9;">No. Telepon</label>
                    <input type="number" id="inputTelpPinjaman" class="glass-input" required placeholder="08...">
                </div>
                <div>
                    <label style="font-size: 13px; font-weight: 600; opacity: 0.9;">Alamat Lengkap</label>
                    <textarea id="inputAlamatPinjaman" class="glass-input" required rows="2" placeholder="Masukkan alamat RT/RW"></textarea>
                </div>
                <div>
                    <label style="font-size: 13px; font-weight: 600; opacity: 0.9;">Nominal Pinjaman (Rp)</label>
                    <input type="number" id="inputNominal" class="glass-input" required placeholder="Contoh: 5000000">
                </div>
                <button type="submit" class="btn-primary" style="margin-top: 15px; padding: 12px; width: 100%; border-radius: 8px;">Setujui Pinjaman</button>
            </form>
        </div>
    </div>
    <div id="detailModal" class="modal-overlay" style="display:none;">
        <div class="modal-content panel-glass">
            <h3 id="modalNama">Nama Peminjam</h3>
            <p><small id="modalID">ID Pinjaman</small></p>
            <hr style="margin: 15px 0; opacity: 0.2;">
            <div class="detail-grid">
                <div><label>Total Pinjaman</label><p id="modalTotal"></p></div>
                <div><label>Sudah Dibayar</label><p id="modalTerbayar"></p></div>
                <div><label>Sisa Tagihan</label><p id="modalSisa" style="color:var(--danger-color); font-weight:bold;"></p></div>
                <div><label>Terakhir Bayar</label><p id="modalTgl"></p></div>
                <div><label>Denda Terakumulasi</label><p id="modalDenda"></p></div>
            </div>
            <p id="modalDendaNote" style="font-size: 12px; margin-top: 10px;"></p>
            <button class="btn-primary" onclick="closeModal()" style="margin-top: 20px; width:100%;">Tutup</button>
        </div>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
